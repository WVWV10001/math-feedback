<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="ink"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#f5f1ed"/>
  <!-- Body -->
  <ellipse cx="256" cy="370" rx="140" ry="100" fill="#fbe89a" stroke="#c4a96a" stroke-width="4" filter="url(#ink)"/>
  <!-- Head -->
  <circle cx="256" cy="230" r="130" fill="#fbe89a" stroke="#c4a96a" stroke-width="4" filter="url(#ink)"/>
  <!-- Ears -->
  <ellipse cx="180" cy="110" rx="35" ry="60" fill="#fbe89a" stroke="#c4a96a" stroke-width="4" transform="rotate(-12,180,130)"/>
  <ellipse cx="332" cy="110" rx="35" ry="60" fill="#fbe89a" stroke="#c4a96a" stroke-width="4" transform="rotate(12,332,130)"/>
  <ellipse cx="180" cy="108" rx="22" ry="42" fill="#fef6d5" transform="rotate(-12,180,130)"/>
  <ellipse cx="332" cy="108" rx="22" ry="42" fill="#fef6d5" transform="rotate(12,332,130)"/>
  <!-- Eyes -->
  <circle cx="200" cy="220" r="14" fill="#3d342f"/>
  <circle cx="312" cy="220" r="14" fill="#3d342f"/>
  <circle cx="206" cy="214" r="5" fill="#fff"/>
  <circle cx="318" cy="214" r="5" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="256" cy="250" rx="12" ry="8" fill="#f0a09b"/>
  <!-- Mouth -->
  <path d="M238 262 Q256 276 274 262" stroke="#3d342f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="170" cy="252" r="18" fill="#f0a09b" opacity="0.25"/>
  <circle cx="342" cy="252" r="18" fill="#f0a09b" opacity="0.25"/>
  <!-- Paws -->
  <ellipse cx="190" cy="430" rx="35" ry="22" fill="#fbe89a" stroke="#c4a96a" stroke-width="3"/>
  <ellipse cx="322" cy="430" rx="35" ry="22" fill="#fbe89a" stroke="#c4a96a" stroke-width="3"/>
</svg>
